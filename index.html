<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Md. Minhazur Rahman Mahim | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #fbfaf7; --text: #1a1a1a; --sidebar: #ffffff; --accent: #2c3e50; }
        .dark { --bg: #121212; --text: #f5f5f5; --sidebar: #1e1e1e; --accent: #e0e0e0; }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; margin: 0; }
        
        /* Sidebar */
        #sidebar { width: 280px; height: 100vh; background: var(--sidebar); position: fixed; left: -280px; transition: 0.3s; padding: 20px; border-right: 1px solid #ccc; z-index: 1000; }
        #sidebar.active { left: 0; }
        .menu-icon { position: fixed; top: 20px; left: 20px; cursor: pointer; font-size: 24px; z-index: 1001; }
        
        main { padding: 50px; max-width: 900px; margin: auto; }
        .card { border: 1px solid #ddd; padding: 20px; margin: 15px 0; border-radius: 8px; }
        
        .footer { text-align: center; margin-top: 50px; padding: 20px; border-top: 1px solid #ccc; }
        .socials a { font-size: 20px; margin: 0 10px; color: var(--text); text-decoration: none; }
    </style>
</head>
<body>

<div class="menu-icon" onclick="toggleSidebar()">☰</div>

<div id="sidebar">
    <button onclick="toggleTheme()">Dark/Light Mode</button>
    <ul style="list-style:none; padding:0; margin-top:20px;">
        <li><a href="#" onclick="show('home')">Home</a></li>
        <li><a href="#" onclick="show('articles')">Bengali Articles (29)</a></li>
    </ul>
</div>

<main id="content">
    <section id="home">
        <h1>Md. Minhazur Rahman Mahim</h1>
        <p>Biomedical Engineering Student | Researcher | Journalist</p>
        <div class="card">
            <h3>Summary</h3>
            <p>I am a B.Sc. student at Islamic University. Passionate about research, innovation, and media.</p>
        </div>
    </section>

    <section id="articles" style="display:none;">
        <h1>Bengali Articles</h1>
        <div id="article-list"></div>
    </section>
</main>

<div class="footer">
    <p>&copy; 2026 Md. Minhazur Rahman Mahim. All rights reserved.</p>
    <div class="socials">
        <a href="https://facebook.com/mdminhazur44rahman"><i class="fab fa-facebook"></i></a>
        <a href="https://instagram.com/mdminhazurrahmanmahim"><i class="fab fa-instagram"></i></a>
        <a href="https://linkedin.com/in/mdminhazur44rahman"><i class="fab fa-linkedin"></i></a>
    </div>
</div>

<script>
    const articles = [
        "২৯/ মানবজীবনে টিকার গুরুত্ব", "২৮/ পাবলিক বিশ্ববিদ্যালয়ে শিক্ষকতা", "২৭/ পশ্চাদপদ মানসিকতা পরিহার করুন", 
        "২৬/ বিশ্ববিদ্যালয়ে সিনিয়র-জুনিয়র সম্পর্ক যেমন হওয়া উচিত", "২৫/ বন্ধু নির্বাচনে হতে হবে সতর্ক", 
        "২৪/ ইদ হলো ঐক্যের, ইদ হলো ভাতৃত্বের", "২৩/ শিক্ষার্থীদের ঝরে পড়া রোধ করতে হবে", 
        "২২/ বাংলাদেশ যেভাবে পরিবেশ দূষণের শীর্ষে", "২১/ ইবির অগঠিত ওয়েবসাইট", "২০/ বন্ধ হোক পলিথিন, সন্ধি হোক পাটের সাথে", 
        "১৯/ স্মার্ট বাংলাদেশে কিশোর গ্যাং যখন বিষফোড়া", "১৮/ পরিবার পরিকল্পনা", "১৭/ ইবির অভ্যন্তরে ভাঙ্গা রাস্তা", 
        "১৬/ বাংলাদেশের নদী ও রেল লাইনের পাশের এলাকাগুলো বস্তি থেকে স্বস্তির হবে কবে?", "১৫/ প্রতি জেলায় পাবলিক বিশ্ববিদ্যালয়", 
        "১৪/ সমস্যায় পরিপূর্ণ ইসলামী বিশ্ববিদ্যালয়", "১৩/ বিশ্বের কোথায় ধর্ষণের শাস্তি কেমন", "১২/ বন্ধু হলো জীবনের এক অমূল্য উপহার", 
        "১১/ শৌচাগারে মোবাইল চালানোর অপকারিতা", "১০/ বন্ধ হোক পোষ্য কোটা", "০৯/ তরুণদের চোখে আগামীর বাংলাদেশ", 
        "০৮/ প্রবীণরা অবহেলার স্বীকার না হোক", "০৭/ পাবলিকিয়ান হওয়ার যুদ্ধ", "০৬/ শীতের আর্তনাদ", 
        "০৫/ ইবির জিমনেসিয়ামে যত সমস্যা", "০৪/ সমুন্নত হোক...", "০৩/ শিক্ষা...", "০২/ স্বাস্থ্য...", "০১/ জীবন..."
    ];

    const list = document.getElementById('article-list');
    articles.forEach(title => {
        list.innerHTML += `<div class="card"><h3>${title}</h3><a href="YOUR_LINK_HERE" target="_blank">Read Here</a></div>`;
    });

    function show(id) {
        document.getElementById('home').style.display = id === 'home' ? 'block' : 'none';
        document.getElementById('articles').style.display = id === 'articles' ? 'block' : 'none';
        document.getElementById('sidebar').classList.remove('active');
    }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    function toggleTheme() { document.body.classList.toggle('dark'); }
</script>
</body>
</html>
